<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Feature Kit — CDN example</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
      body { font-family: system-ui, sans-serif; max-width: 640px; margin: 80px auto; padding: 0 16px; line-height: 1.55; }
      h1 { font-size: 28px; }
      code { background: #f1f5f9; padding: 2px 6px; border-radius: 4px; }
    </style>
  </head>
  <body>
    <h1>Feature Kit — CDN example</h1>
    <p>
      The launcher in the bottom-right was mounted by the script below. Replace
      <code>fh_demo_xxx</code> with your project key from the console.
    </p>

    <!-- 1. Load the SDK from a CDN. No build step required. -->
    <script src="https://cdn.jsdelivr.net/npm/@featurekit/sdk-js/dist/featurekit.iife.js"></script>

    <!-- 2. Mount the widget. The launcher will appear bottom-right. -->
    <script>
      window.FeatureKit.mount({
        projectKey: "fh_demo_xxx",
        user: { externalId: "demo-user" },
        label: "Send feedback",
      });
    </script>
  </body>
</html>
